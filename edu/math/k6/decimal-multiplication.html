<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小数乘法可视化</title>
<link rel="stylesheet" href="template.css" />
<style>
/* 页面专属样式 - 面积网格 */
.viz-wrap {
  display: flex; flex-direction: column; align-items: center;
  margin: 12px 0;
}
canvas#gridCanvas {
  border-radius: var(--radius-sm);
  background: #fff;
  box-shadow: var(--shadow-sm);
  max-width: 100%;
}
.grid-annotation {
  margin-top: 8px; font-size: 13px; color: var(--text-muted);
  text-align: center; min-height: 20px;
}

/* 居中修复 */
.geo-card .card-title {
  justify-content: center;
  text-align: center;
}
.geo-card:has(#gridCanvas) .card-title {
  justify-content: flex-start;
}

/* 计算过程 */
.process-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  margin: 8px 0;
}
@media (max-width: 640px) {
  .process-grid { grid-template-columns: 1fr; }
}  
.process-card {
  padding: 14px;
  background: var(--accent-bg);
  border-radius: var(--radius-sm);
  text-align: center;
}
.process-card .row {
  padding: 5px 0;
  display: flex; align-items: baseline; gap: 8px;
  justify-content: center;
  font-size: 14px; color: var(--text);
  border-bottom: 1px dashed var(--border);
}
.process-card .row:last-child { border-bottom: none; }
.process-card .step-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); color: #fff; font-size: 11px; font-weight: 700;
  flex-shrink: 0;
}
.process-card .hl-num { color: var(--danger); font-weight: 700; }
.process-card .hl-green { color: var(--success); font-weight: 700; }
.process-card .result-line {
  margin-top: 8px; padding: 8px 0 2px;
  font-size: 20px; font-weight: 700; color: var(--accent-dark);
  text-align: center; border-top: 2px solid var(--accent);
}

/* 练习区 */
.practice-problem {
  font-size: 22px; font-weight: 700; color: var(--accent-dark);
  text-align: center; padding: 16px;
  background: var(--accent-bg);
  border-radius: var(--radius-sm);
  border: 2px dashed var(--border-light);
}
.practice-row {
  display: flex; gap: 10px; align-items: center;
  justify-content: center; margin-top: 10px;
}
.practice-row input {
  width: 120px; padding: 10px 14px; font-size: 20px;
  border: 2px solid var(--border-light); border-radius: var(--radius-sm);
  text-align: center; outline: none; font-weight: 700;
  transition: 0.2s; font-family: var(--font-mono);
}
.practice-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
.practice-row input.correct { border-color: var(--success); background: var(--success-bg); }
.practice-row input.wrong { border-color: var(--danger); background: #fee2e2; }
.feedback { text-align: center; font-size: 16px; font-weight: 600; min-height: 28px; padding: 6px; }
.feedback.correct { color: var(--success); }
.feedback.wrong { color: var(--danger); }

/* 计数着色器 - 跟随主题 */
.col-label {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; color: var(--text-muted); margin-right: 10px;
}
.col-dot {
  display: inline-block; width: 10px; height: 10px; border-radius: 2px;
}
</style>
</head>
<body>

<!-- 主题切换器 -->
<div class="theme-picker" id="themePicker">
  <button data-theme="default" style="background:#3b82f6" title="默认蓝"></button>
  <button data-theme="green" style="background:#2ecc71" title="绿色"></button>
  <button data-theme="purple" style="background:#8b5cf6" title="紫色"></button>
  <button data-theme="orange" style="background:#f97316" title="橙色"></button>
  <button data-theme="dark" style="background:#1e293b" title="暗色"></button>
</div>

<div class="container">

<h1>小数乘法可视化</h1>
<p class="subtitle">五年级上册 · 拖动滑块调整数字，理解小数乘法的面积模型</p>

<div class="toolbar">
  <div class="control-group">
    <label>被乘数 <span id="valA-label" style="color:var(--accent);font-weight:700;">3.6</span></label>
    <input type="range" id="sliderA" min="10" max="99" value="36" step="1" />
    <div class="input-group">
      <button class="step-btn sub" data-target="numA" data-delta="-10">−10</button>
      <button class="step-btn sub" data-target="numA" data-delta="-1">−1</button>
      <input type="number" id="numA" min="10" max="99" value="36" />
      <button class="step-btn" data-target="numA" data-delta="1">+1</button>
      <button class="step-btn" data-target="numA" data-delta="10">+10</button>
    </div>
  </div>
  <div class="control-group">
    <label>乘数 <span id="valB-label" style="color:var(--accent);font-weight:700;">2.4</span></label>
    <input type="range" id="sliderB" min="10" max="99" value="24" step="1" />
    <div class="input-group">
      <button class="step-btn sub" data-target="numB" data-delta="-10">−10</button>
      <button class="step-btn sub" data-target="numB" data-delta="-1">−1</button>
      <input type="number" id="numB" min="10" max="99" value="24" />
      <button class="step-btn" data-target="numB" data-delta="1">+1</button>
      <button class="step-btn" data-target="numB" data-delta="10">+10</button>
    </div>
  </div>
</div>

<div class="eq-bar" id="eqBar">3.6 × 2.4 = <span class="hl" id="resultDisplay">8.64</span></div>

<div class="tabs">
  <button class="tab active" data-tab="area">📐 面积模型</button>
  <button class="tab" data-tab="count">🔢 计数模型</button>
</div>

<div class="geo-card">
  <div class="card-title">
    <span>📊 网格可视化</span>
    <span class="grid-annotation" id="gridAnnotation" style="font-size:12px;font-weight:400;flex:1;text-align:right;"></span>
  </div>

  <div class="viz-wrap">
    <canvas id="gridCanvas" width="380" height="380"></canvas>
  </div>

  <div class="step-controls">
    <button class="btn btn-blue" id="btnPrev">◀ 上一步</button>
    <button class="btn btn-green" id="btnAuto">▶ 自动演示</button>
    <button class="btn btn-outline" id="btnReset">⟲ 重置</button>
    <button class="btn btn-blue" id="btnNext">下一步 ▶</button>
  </div>

  <div class="step-desc" id="stepDesc">点击 <strong>下一步</strong> 开始分步学习</div>

  <div class="verify-box" id="verifyBox"></div>
</div>

<div class="geo-card" style="margin-top:16px;">
  <div class="card-title">📝 计算过程</div>
  <div class="process-card">
    <div class="row">
      <span class="step-badge">1</span>
      <span>转化整数: <span class="hl-num" id="step1a">36</span> × <span class="hl-num" id="step1b">24</span></span>
    </div>
    <div class="row">
      <span class="step-badge">2</span>
      <span>整数积: 36 × 24 = <span class="hl-green" id="step2">864</span></span>
    </div>
    <div class="row">
      <span class="step-badge">3</span>
      <span>共 <span class="hl-num" id="step3a">2</span> 位小数 → 积点 <span class="hl-num" id="step3b">2</span> 位</span>
    </div>
    <div class="result-line">
      <span class="hl-num" id="resultBig">8.64</span>
    </div>
  </div>
</div>

<div class="geo-card" style="margin-top:12px;">
  <div class="card-title">🎯 随堂练习</div>
  <div class="practice-problem" id="practiceProblem">3.2 × 1.6 = ?</div>
  <div class="practice-row">
    <input type="number" id="practiceInput" step="any" placeholder="?" autocomplete="off" />
    <button class="btn btn-blue" id="practiceCheckBtn">检查</button>
  </div>
  <div class="feedback" id="practiceFeedback"></div>
  <div style="text-align:center;margin-top:6px;">
    <button class="btn btn-outline" id="practiceNextBtn">下一题 ✨</button>
  </div>
</div>

<script>
(function() {
  // Fallback if template.js didn't load (file:// protocol etc)
  if (typeof window.getThemeColor !== 'function') {
    window.getThemeColor = function(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); };
  }
  if (typeof window.hexToRgba !== 'function') {
    window.hexToRgba = function(h, a) {
      if (!h || h.length < 7) return 'rgba(0,0,0,' + (a || 0.5) + ')';
      return 'rgba(' + parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)+','+(a||1)+')';
    };
  }

  var $ = function(id) { return document.getElementById(id); };

  // ------ DOM refs ------
  var canvas = $('gridCanvas');
  var ctx = canvas.getContext('2d');
  var displaySize = 380;

  var sliderA = $('sliderA'), sliderB = $('sliderB');
  var numA = $('numA'), numB = $('numB');
  var valALabel = $('valA-label'), valBLabel = $('valB-label');
  var eqBar = $('eqBar'), resultDisplay = $('resultDisplay');
  var resultBig = $('resultBig'), gridAnnotation = $('gridAnnotation');
  var step1a = $('step1a'), step1b = $('step1b'), step2 = $('step2');
  var step3a = $('step3a'), step3b = $('step3b');
  var stepDesc = $('stepDesc'), verifyBox = $('verifyBox');
  var btnPrev = $('btnPrev'), btnNext = $('btnNext');
  var btnAuto = $('btnAuto'), btnReset = $('btnReset');

  // ------ State ------
  var currentStep = 0;
  var maxStep = 5;
  var autoTimer = null;

  // ------ Tab switching ------
  var currentView = 'area';
  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      currentView = this.dataset.tab;
      drawGrid(currentStep);
      syncSliderAndInput();
    });
  });

  // ------ Sync slider <-> number input ------
  function syncSliderAndInput() {
    numA.value = sliderA.value;
    numB.value = sliderB.value;
  }
  function syncInputToSlider() {
    var v = parseInt(numA.value); if (isNaN(v) || v < 10) v = 10; if (v > 99) v = 99;
    sliderA.value = v; numA.value = v;
    v = parseInt(numB.value); if (isNaN(v) || v < 10) v = 10; if (v > 99) v = 99;
    sliderB.value = v; numB.value = v;
  }

  // ------ Values ------
  function getVals() {
    var a = parseInt(sliderA.value, 10);
    var b = parseInt(sliderB.value, 10);
    return { a: a / 10, b: b / 10, aInt: a, bInt: b };
  }

  // ------ Drawing ------
  function drawGrid(step) {
    step = step || 0;
    // 读取主题色供 canvas 使用
    var tc_accent = getThemeColor('--accent') || '#3b82f6';
    var tc_success = getThemeColor('--success') || '#27ae60';
    var tc_danger = getThemeColor('--danger') || '#e74c3c';
    var tc_warning = getThemeColor('--warning') || '#e67e22';
    var tc_textMuted = getThemeColor('--text-muted') || '#64748b';
    var tc_text = getThemeColor('--text') || '#1e293b';
    var vals = getVals();
    var aVal = vals.a, bVal = vals.b;
    var aInt = vals.aInt, bInt = vals.bInt;
    var product = aVal * bVal;
    var productRounded = Math.round(product * 100) / 100;

    // Update labels
    valALabel.textContent = aVal.toFixed(1);
    valBLabel.textContent = bVal.toFixed(1);
    eqBar.innerHTML = aVal.toFixed(1) + ' × ' + bVal.toFixed(1) + ' = <span class="hl">' + productRounded.toFixed(2) + '</span>';
    resultDisplay.textContent = productRounded.toFixed(2);
    resultBig.textContent = productRounded.toFixed(2);

    // Steps
    step1a.textContent = aInt;
    step1b.textContent = bInt;
    step2.textContent = (aInt * bInt);
    var dp = ((aVal % 1 !== 0) ? 1 : 0) + ((bVal % 1 !== 0) ? 1 : 0);
    step3a.textContent = dp;
    step3b.textContent = dp;

    // Canvas
    ctx.clearRect(0, 0, displaySize, displaySize);
    var pad = { top: 38, bottom: 20, left: 30, right: 20 };
    var gridW = displaySize - pad.left - pad.right;
    var gridH = displaySize - pad.top - pad.bottom;

    var aTenths = Math.round(aVal * 10);
    var bTenths = Math.round(bVal * 10);
    var aWhole = Math.floor(aVal);
    var bWhole = Math.floor(bVal);
    var aFrac = aTenths % 10;
    var bFrac = bTenths % 10;

    // Dynamic grid size: show ALL tenths cells
    var cols = Math.max(aTenths, 1);
    var rows = Math.max(bTenths, 1);
    var cellW = gridW / cols;
    var cellH = gridH / rows;

    // Step indicator bar at top
    if (step > 0) {
      var stepLabels = ['', '面积模型', '转为整数', '整数积', '定位小数点', '结果'];
      ctx.fillStyle = hexToRgba(tc_accent, 0.08);
      ctx.fillRect(pad.left, 2, gridW, 24);
      ctx.fillStyle = tc_accent;
      ctx.font = 'bold 12px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('📍 第' + step + '步：' + stepLabels[step], pad.left + gridW / 2, 14);
    }

    // Background
    ctx.fillStyle = '#fafbff';
    ctx.fillRect(pad.left, pad.top, gridW, gridH);

    // Grid lines - adaptive density
    var drawFine = (cols <= 20 && rows <= 20);
    ctx.strokeStyle = drawFine ? '#ddd' : 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 0.5;
    if (drawFine) {
      for (var i = 0; i <= cols; i++) {
        ctx.beginPath(); ctx.moveTo(pad.left + i * cellW, pad.top); ctx.lineTo(pad.left + i * cellW, pad.top + gridH); ctx.stroke();
      }
      for (var i = 0; i <= rows; i++) {
        ctx.beginPath(); ctx.moveTo(pad.left, pad.top + i * cellH); ctx.lineTo(pad.left + gridW, pad.top + i * cellH); ctx.stroke();
      }
    } else {
      // Major grid lines only
      var stepCol = cols > 50 ? 10 : 5;
      for (var i = 0; i <= cols; i += stepCol) {
        ctx.beginPath(); ctx.moveTo(pad.left + i * cellW, pad.top); ctx.lineTo(pad.left + i * cellW, pad.top + gridH); ctx.stroke();
      }
      var stepRow = rows > 50 ? 10 : 5;
      for (var i = 0; i <= rows; i += stepRow) {
        ctx.beginPath(); ctx.moveTo(pad.left, pad.top + i * cellH); ctx.lineTo(pad.left + gridW, pad.top + i * cellH); ctx.stroke();
      }
    }

    // Fill cells
    for (var row = 0; row < rows; row++) {
      for (var col = 0; col < cols; col++) {
        var cx = pad.left + col * cellW;
        var cy = pad.top + row * cellH;
        var inCol = col < aTenths;
        var inRow = row < bTenths;

        if (inCol && inRow) {
          if (currentView === 'area') {
            var colT = col < aWhole * 10 ? 'w' : 'f';
            var rowT = row < bWhole * 10 ? 'w' : 'f';
            if (colT === 'w' && rowT === 'w') ctx.fillStyle = '#ff8a65';
            else if (colT === 'w' && rowT === 'f') ctx.fillStyle = '#ffab91';
            else if (colT === 'f' && rowT === 'w') ctx.fillStyle = '#ffccbc';
            else ctx.fillStyle = '#ffe0b2';
          } else {
            ctx.fillStyle = '#ff8a65';
          }
          ctx.fillRect(cx, cy, cellW, cellH);
        } else if (inCol && !inRow) {
          if (currentView === 'area') { ctx.fillStyle = 'rgba(92,107,192,0.18)'; ctx.fillRect(cx, cy, cellW, cellH); }
        } else if (!inCol && inRow) {
          if (currentView === 'area') { ctx.fillStyle = 'rgba(92,107,192,0.10)'; ctx.fillRect(cx, cy, cellW, cellH); }
        }
      }
    }

    // Border
    ctx.strokeStyle = tc_textMuted;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(pad.left, pad.top, gridW, gridH);

    // ---- 坐标标注 ----
    if (currentView === 'area') {
      // Column index labels — adaptive density
      ctx.fillStyle = tc_textMuted;
      ctx.font = cols <= 40 ? '9px sans-serif' : '7px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      var colStep = cols <= 20 ? 1 : (cols <= 50 ? 2 : 5);
      for (var ci = colStep; ci <= cols; ci += colStep) {
        ctx.fillText(ci, pad.left + (ci - 0.5) * cellW, pad.top - 2);
      }
      // Row index labels — adaptive density
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      var rowStep = rows <= 20 ? 1 : (rows <= 50 ? 2 : 5);
      for (var ri = rowStep; ri <= rows; ri += rowStep) {
        ctx.fillText(ri, pad.left - 4, pad.top + (ri - 0.5) * cellH);
      }

      // 整/小 分隔线 (虚线)
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 4]);
      if (aWhole > 0 && aFrac > 0) {
        var sepX = pad.left + aWhole * 10 * cellW;
        ctx.beginPath(); ctx.moveTo(sepX, pad.top); ctx.lineTo(sepX, pad.top + gridH); ctx.stroke();
      }
      if (bWhole > 0 && bFrac > 0) {
        var sepY = pad.top + bWhole * 10 * cellH;
        ctx.beginPath(); ctx.moveTo(pad.left, sepY); ctx.lineTo(pad.left + gridW, sepY); ctx.stroke();
      }
      ctx.setLineDash([]);

      // 四象限标注: 格子数 × 格子数 = 总格数
      var wW = aWhole * 10, hW = bWhole * 10;
      var wF = aFrac, hF = bFrac;
      ctx.font = 'bold 11px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

      function labelQuad(cx, cy, txt) {
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        var tw = ctx.measureText(txt).width;
        ctx.fillRect(cx - tw / 2 - 4, cy - 8, tw + 8, 16);
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillText(txt, cx, cy);
      }

      if (wW > 0 && hW > 0) labelQuad(pad.left + wW * cellW / 2, pad.top + hW * cellH / 2, wW + '×' + hW + '=' + (wW * hW));
      if (wF > 0 && hW > 0) labelQuad(pad.left + (wW + wF / 2) * cellW, pad.top + hW * cellH / 2, wF + '×' + hW + '=' + (wF * hW));
      if (wW > 0 && hF > 0) labelQuad(pad.left + wW * cellW / 2, pad.top + (hW + hF / 2) * cellH, wW + '×' + hF + '=' + (wW * hF));
      if (wF > 0 && hF > 0) labelQuad(pad.left + (wW + wF / 2) * cellW, pad.top + (hW + hF / 2) * cellH, wF + '×' + hF + '=' + (wF * hF));

      // 总面积标注 (右下角)
      if (aTenths > 0 && bTenths > 0) {
        var totalCells = aTenths * bTenths;
        ctx.fillStyle = hexToRgba(tc_danger, 0.08);
        ctx.fillRect(pad.left, pad.top + bTenths * cellH - 22, aTenths * cellW, 22);
        ctx.fillStyle = tc_danger;
        ctx.font = 'bold 11px "PingFang SC","Microsoft YaHei",sans-serif';
        ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
        ctx.fillText('总计 ' + totalCells + ' 格 = ' + (totalCells / 100).toFixed(2), pad.left + aTenths * cellW - 4, pad.top + bTenths * cellH - 4);
      }
    } else {
      // 计数视图: 行×列标注
      if (aTenths > 0 && bTenths > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.font = 'bold 13px "PingFang SC","Microsoft YaHei",sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(aTenths + ' × ' + bTenths + ' = ' + (aTenths * bTenths), pad.left + aTenths * cellW / 2, pad.top + bTenths * cellH / 2);
      }
    }

    // Step-specific overlays
    if (step >= 1) {
      // Product highlight border
      if (aTenths > 0 && bTenths > 0) {
        ctx.strokeStyle = tc_danger;
        ctx.lineWidth = 2.5;
        ctx.setLineDash([5, 4]);
        ctx.strokeRect(pad.left, pad.top, aTenths * cellW, bTenths * cellH);
        ctx.setLineDash([]);
      }
    }

    // Step 2: Show integer conversion labels
    if (step >= 2) {
      ctx.fillStyle = hexToRgba(tc_danger, 0.9);
      ctx.font = 'bold 14px "PingFang SC","Microsoft YaHei",sans-serif';
      var labelY = pad.top + bTenths * cellH + 16;
      ctx.textAlign = 'center';
      ctx.fillText('→ ' + aInt + ' × ' + bInt + ' = ?', pad.left + aTenths * cellW / 2, labelY);
    }

    // Step 3: Show product result
    if (step >= 3) {
      ctx.fillStyle = hexToRgba(tc_success, 0.9);
      ctx.font = 'bold 14px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('整数积 = ' + (aInt * bInt), pad.left + aTenths * cellW / 2, pad.top + bTenths * cellH + 36);
    }

    // Step 4: Show decimal point label
    if (step >= 4) {
      ctx.fillStyle = hexToRgba(tc_warning, 0.9);
      ctx.font = 'bold 14px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('小数点向左移 ' + dp + ' 位', pad.left + aTenths * cellW / 2, pad.top + bTenths * cellH + 56);
    }

    // Step 5: Show final result
    if (step >= 5) {
      ctx.fillStyle = hexToRgba(tc_success, 0.15);
      ctx.fillRect(pad.left, pad.top, aTenths * cellW, bTenths * cellH);
      ctx.fillStyle = tc_success;
      ctx.font = 'bold 20px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(productRounded.toFixed(2), pad.left + aTenths * cellW / 2, pad.top + bTenths * cellH / 2);
    }

    // Axis labels (always)
    ctx.fillStyle = '#d84315';
    ctx.font = 'bold 13px "PingFang SC","Microsoft YaHei",sans-serif';
    // Origin "0"
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('0', pad.left - 6, pad.top - 2);
    // X-axis: value label
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    if (aTenths > 0) ctx.fillText(aVal.toFixed(1), pad.left + aTenths * cellW / 2, pad.top - 6);
    // X-axis: unit tick at end
    ctx.fillStyle = tc_textMuted;
    ctx.font = '8px sans-serif';
    ctx.fillText('×0.1', pad.left + aTenths * cellW - 2, pad.top - 4);
    // Y-axis: value label (rotated)
    ctx.fillStyle = '#d84315';
    ctx.font = 'bold 13px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
    if (bTenths > 0) {
      ctx.save();
      ctx.translate(pad.left - 8, pad.top + bTenths * cellH / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText(bVal.toFixed(1), 0, 0);
      ctx.restore();
    }
    // Y-axis: unit tick at end
    ctx.fillStyle = tc_textMuted;
    ctx.font = '8px sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.save();
    ctx.translate(pad.left - 16, pad.top + bTenths * cellH);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('×0.1', 0, 0);
    ctx.restore();
    // Cell unit note
    ctx.fillStyle = hexToRgba(tc_textMuted, 0.6);
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
    ctx.fillText('每格=0.01', pad.left + gridW, pad.top + gridH);

    // Annotation
    var totalCells = aTenths * bTenths;
    if (currentView === 'count') {
      gridAnnotation.textContent = '橙色格子 = ' + aTenths + ' × ' + bTenths + ' = ' + totalCells + ' 格 × 0.01 = ' + (totalCells / 100).toFixed(2);
    } else {
      var parts = [];
      var wA = aWhole * 10, wB = bWhole * 10;
      var ii = wA * wB; if (ii > 0) parts.push('整×整:' + ii + '格');
      var iF = wA * bFrac; if (iF > 0) parts.push('整×小:' + iF + '格');
      var fI = aFrac * wB; if (fI > 0) parts.push('小×整:' + fI + '格');
      var fF = aFrac * bFrac; if (fF > 0) parts.push('小×小:' + fF + '格');
      gridAnnotation.textContent = '总面积 = ' + totalCells + ' 小格 = ' + (totalCells / 100).toFixed(2) + '  （' + parts.join('  ') + '）';
    }
  }

  // ------ Step system ------
  var stepDescriptions = [
    '点击 <strong>下一步</strong> 开始分步学习',
    '<em>第1步：面积模型</em> — 橙色区域 = 被乘数 × 乘数的重叠面积，每个小格 = 0.01',
    '<em>第2步：转为整数</em> — 去掉小数点，<span class="hl-num" id="sd1">3.6</span> → <b>36</b>，<span class="hl-num" id="sd2">2.4</span> → <b>24</b>',
    '<em>第3步：计算整数积</em> — 36 × 24 = <span class="green">864</span>',
    '<em>第4步：定位小数点</em> — 两个因数共有 <b>2</b> 位小数，从积右边数 <b>2</b> 位',
    '<span class="green">✅ 得到结果！</span> 864 → 点上小数点 → <span style="color:var(--accent-dark);font-weight:700;font-size:1.1em;">8.64</span>'
  ];

  function renderStep(step) {
    currentStep = step;
    if (currentStep < 0) currentStep = 0;
    if (currentStep > maxStep) currentStep = maxStep;

    stepDesc.innerHTML = stepDescriptions[currentStep];
    drawGrid(currentStep);

    // Update dynamic numbers in step desc
    if (currentStep >= 2) {
      var v = getVals();
      var sd1 = document.getElementById('sd1');
      var sd2 = document.getElementById('sd2');
      if (sd1) sd1.textContent = v.a.toFixed(1);
      if (sd2) sd2.textContent = v.b.toFixed(1);
    }

    // Verify box
    var vals = getVals();
    var prod = Math.round(vals.a * vals.b * 100) / 100;
    if (currentStep === maxStep) {
      verifyBox.innerHTML = '<span class="v-num">' + vals.a.toFixed(1) + '</span>' +
        '<span class="v-op">×</span>' +
        '<span class="v-num">' + vals.b.toFixed(1) + '</span>' +
        '<span class="v-op">=</span>' +
        '<span class="v-num">' + prod.toFixed(2) + '</span> ' +
        '<span class="v-ok">✓</span>';
    } else {
      verifyBox.innerHTML = '';
    }
  }

  function nextStep() {
    if (currentStep < maxStep) {
      renderStep(currentStep + 1);
    }
  }

  function prevStep() {
    if (currentStep > 0) {
      renderStep(currentStep - 1);
    }
  }

  function resetSteps() {
    renderStep(0);
    stopAuto();
  }

  function stopAuto() {
    if (autoTimer) {
      clearInterval(autoTimer);
      autoTimer = null;
      btnAuto.textContent = '▶ 自动演示';
    }
  }

  function startAuto() {
    if (autoTimer) { stopAuto(); return; }
    if (currentStep >= maxStep) { renderStep(0); }
    autoTimer = setInterval(function() {
      if (currentStep >= maxStep) { stopAuto(); return; }
      renderStep(currentStep + 1);
    }, 2000);
    btnAuto.textContent = '⏸ 暂停';
  }

  // ------ Button handlers ------
  btnNext.onclick = nextStep;
  btnPrev.onclick = prevStep;
  btnReset.onclick = resetSteps;
  btnAuto.onclick = startAuto;

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight') { nextStep(); e.preventDefault(); }
    if (e.key === 'ArrowLeft') { prevStep(); e.preventDefault(); }
    if (e.key === 'Enter') { startAuto(); }
  });

  // ------ Slider/Input sync ------
  function updateFromSlider() {
    syncSliderAndInput();
    drawGrid(currentStep);
    if (currentStep > 0) renderStep(currentStep); // refresh verify box if needed
  }

  sliderA.addEventListener('input', updateFromSlider);
  sliderB.addEventListener('input', updateFromSlider);

  // Number input change
  numA.addEventListener('input', function() {
    var v = parseInt(this.value);
    if (isNaN(v) || v < 10) v = 10;
    if (v > 99) v = 99;
    sliderA.value = v;
    this.value = v;
    updateFromSlider();
  });
  numB.addEventListener('input', function() {
    var v = parseInt(this.value);
    if (isNaN(v) || v < 10) v = 10;
    if (v > 99) v = 99;
    sliderB.value = v;
    this.value = v;
    updateFromSlider();
  });

  // ------ Practice mode ------
  var practiceProblem = $('practiceProblem');
  var practiceInput = $('practiceInput');
  var practiceCheckBtn = $('practiceCheckBtn');
  var practiceFeedback = $('practiceFeedback');
  var practiceNextBtn = $('practiceNextBtn');
  var currentPracticeAnswer = 0;

  function generatePractice() {
    var aInt = Math.floor(Math.random() * 89) + 10;
    var bInt = Math.floor(Math.random() * 89) + 10;
    var a = aInt / 10, b = bInt / 10;
    currentPracticeAnswer = Math.round(a * b * 100) / 100;
    practiceProblem.textContent = a.toFixed(1) + ' × ' + b.toFixed(1) + ' = ?';
    practiceInput.value = '';
    practiceInput.className = '';
    practiceFeedback.textContent = '';
    practiceFeedback.className = 'feedback';
  }

  practiceCheckBtn.addEventListener('click', function() {
    var val = parseFloat(practiceInput.value);
    if (isNaN(val)) {
      practiceFeedback.textContent = '⚠️ 请输入数字';
      practiceFeedback.className = 'feedback wrong';
      return;
    }
    var rounded = Math.round(val * 100) / 100;
    if (Math.abs(rounded - currentPracticeAnswer) < 0.005) {
      practiceFeedback.textContent = '✅ 正确！' + practiceProblem.textContent.replace('?', currentPracticeAnswer.toFixed(2));
      practiceFeedback.className = 'feedback correct';
      practiceInput.className = 'correct';
    } else {
      practiceFeedback.textContent = '❌ 正确答案是 ' + currentPracticeAnswer.toFixed(2);
      practiceFeedback.className = 'feedback wrong';
      practiceInput.className = 'wrong';
    }
  });

  practiceNextBtn.addEventListener('click', generatePractice);

  practiceInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') practiceCheckBtn.click();
  });

  // ------ Init ------
  generatePractice();
  renderStep(0);
  drawGrid();
  syncSliderAndInput();
})();
</script>

<script src="template.js"></script>
<script>
// 主题切换（运行在 template.js 之后、页面脚本之前，确保 getThemeColor 可用时主题已应用）
window._templateThemeInjected = true;
(function() {
  var picker = document.getElementById('themePicker');
  if (!picker) return;
  var saved = localStorage.getItem('template-theme') || 'default';
  if (saved && saved !== 'default') document.documentElement.setAttribute('data-theme', saved);
  picker.querySelectorAll('button').forEach(function(btn) {
    if (btn.dataset.theme === saved) btn.classList.add('active');
    btn.addEventListener('click', function() {
      picker.querySelectorAll('button').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      if (this.dataset.theme === 'default') document.documentElement.removeAttribute('data-theme');
      else document.documentElement.setAttribute('data-theme', this.dataset.theme);
      localStorage.setItem('template-theme', this.dataset.theme);
    });
  });
})();
</script>
</body>

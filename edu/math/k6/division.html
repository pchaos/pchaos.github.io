<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <title>除法的意义 — 可视化</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="template.js"></script>
  <style>
.viz-area { background: var(--card); border-radius: 16px; padding: 28px; box-shadow: var(--shadow); min-height: 340px; }
.viz-title { font-size: 1.15em; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.viz-desc { color: var(--text-muted); font-size: 0.9em; margin-bottom: 18px; line-height: 1.6; }
.equation { text-align: center; font-size: 1.8em; font-weight: 700; margin: 16px 0; color: var(--danger); letter-spacing: 2px; }
.equation span { color: var(--accent); }
.division-grid { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
.group-box { border: 3px solid var(--accent); border-radius: 12px; padding: 12px; min-width: 70px; text-align: center; background: var(--accent-bg); }
.group-box .group-label { font-size: 0.75em; color: var(--accent); margin-bottom: 8px; font-weight: 600; }
.group-box .dots { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.dot { width: 22px; height: 22px; border-radius: 50%; background: var(--danger); display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 0.65em; font-weight: 700; animation: popIn 0.3s ease-out; }
@keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.15); } 100% { transform: scale(1); } }
.contains-row { display: flex; align-items: center; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 12px 0; }
.item-block { width: 36px; height: 36px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-size: 0.85em; }
.item-block.apple { background: var(--danger); }
.item-block.banana { background: #f39c12; }
.item-block.grape { background: #8e44ad; }
.bracket { font-size: 2em; color: var(--success); font-weight: 300; line-height: 1; }
.bracket-label { font-size: 0.7em; color: var(--success); font-weight: 600; text-align: center; }
.measure-bar { position: relative; height: 50px; background: var(--border); border-radius: 10px; margin: 16px 0; overflow: hidden; }
.measure-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); border-radius: 10px; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; color: #fff; font-weight: 700; font-size: 0.9em; transition: width 0.5s ease; }
.measure-marks { display: flex; position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
.measure-mark { border-right: 2px dashed rgba(0,0,0,0.3); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px; font-size: 0.65em; color: var(--text-muted); }
.summary { background: var(--highlight-yellow); border-left: 4px solid var(--warning); padding: 14px 18px; border-radius: 0 8px 8px 0; margin-top: 20px; font-size: 0.9em; line-height: 1.7; }
.summary strong { color: var(--warning); }
.remainder-tag { display: inline-block; background: var(--danger); color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 0.8em; margin-left: 8px; }
  </style>
</head>
<body>
<div class="container">
<h1>🧮 除法的意义</h1>
  <p class="subtitle">拖动滑块，直观理解三种除法含义</p>
  <div class="toolbar">
    <div class="control-group">
      <label>🍎 总数（被除数）</label>
      <input type="range" id="totalSlider" min="2" max="24" value="12">
      <div class="input-group">
        <button class="step-btn sub" data-target="nTotal" data-delta="-2">−2</button>
        <button class="step-btn sub" data-target="nTotal" data-delta="-1">−1</button>
        <input type="number" id="nTotal" min="2" max="24" value="12">
        <button class="step-btn" data-target="nTotal" data-delta="1">+1</button>
        <button class="step-btn" data-target="nTotal" data-delta="2">+2</button>
      </div>
    </div>
    <div class="control-group">
      <label>📐 每份数 / 每组大小（除数）</label>
      <input type="range" id="divisorSlider" min="2" max="12" value="4">
      <div class="input-group">
        <button class="step-btn sub" data-target="nDivisor" data-delta="-2">−2</button>
        <button class="step-btn sub" data-target="nDivisor" data-delta="-1">−1</button>
        <input type="number" id="nDivisor" min="2" max="12" value="4">
        <button class="step-btn" data-target="nDivisor" data-delta="1">+1</button>
        <button class="step-btn" data-target="nDivisor" data-delta="2">+2</button>
      </div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" data-mode="equal-share">等分除法</div>
    <div class="tab" data-mode="contain">包含除法</div>
    <div class="tab" data-mode="measure">量度除法</div>
  </div>
  <div class="viz-area" id="vizArea"></div>
</div>

<script>
const totalSlider = document.getElementById('totalSlider'), divisorSlider = document.getElementById('divisorSlider'), vizArea = document.getElementById('vizArea');
let currentMode = 'equal-share';
const fruits = ['🍎','🍌','🍇','🍊','🫐','🥝','🍑','🍋','🍉','🥭','🍓','🍒'];
function update() {
  const total = parseInt(totalSlider.value), divisor = parseInt(divisorSlider.value);
  document.getElementById('nTotal').value = total; document.getElementById('nDivisor').value = divisor;
  if (divisor > total) { divisorSlider.value = total; update(); return; }
  if (currentMode === 'equal-share') renderEqualShare(total, divisor);
  else if (currentMode === 'contain') renderContain(total, divisor);
  else renderMeasure(total, divisor);
}
function renderEqualShare(total, divisor) {
  const quotient = Math.floor(total / divisor), remainder = total % divisor;
  let groupsHTML = '';
  for (let g = 0; g < divisor; g++) {
    let dotsHTML = '';
    for (let d = 0; d < quotient; d++) dotsHTML += '<div class="dot" style="animation-delay:' + ((g*quotient+d)*0.05) + 's">' + fruits[(g*quotient+d) % fruits.length] + '</div>';
    if (g < remainder) dotsHTML += '<div class="dot" style="background:var(--warning);animation-delay:' + ((g*quotient+quotient)*0.05) + 's">' + fruits[(g*quotient+quotient) % fruits.length] + '</div>';
    groupsHTML += '<div class="group-box"><div class="group-label">第' + (g+1) + '份</div><div class="dots">' + dotsHTML + '</div></div>';
  }
  const remHTML = remainder > 0 ? '<span class="remainder-tag">余 ' + remainder + '</span>' : '';
  const result = remainder > 0 ? quotient + ' 余 ' + remainder : '' + quotient;
  vizArea.innerHTML = '<div class="viz-title">🟢 等分除法 — 平均分成若干份，求每份多少</div><div class="viz-desc">把 <strong>' + total + '</strong> 个物品<strong>平均分成 ' + divisor + ' 份</strong>，每份有多少？</div><div class="division-grid">' + groupsHTML + '</div><div class="equation">' + total + ' ÷ ' + divisor + ' = <span>' + result + '</span> ' + remHTML + '</div><div class="summary"><strong>含义：</strong>把 ' + total + ' 平均分成 ' + divisor + ' 份，每份 ' + quotient + ' 个' + (remainder > 0 ? '，还多出 ' + remainder + ' 个分不完' : '') + '。<br><strong>关键：</strong>除数 = 份数，商 = 每份的数量。' + (remainder > 0 ? ' 有余数说明不能正好分完。' : '') + '</div>';
}
function renderContain(total, divisor) {
  const quotient = Math.floor(total / divisor), remainder = total % divisor, colors = ['apple','banana','grape'];
  let groupsHTML = '';
  for (let g = 0; g < quotient; g++) {
    let itemsHTML = '';
    for (let d = 0; d < divisor; d++) { const idx = g * divisor + d; itemsHTML += '<div class="item-block ' + colors[g % 3] + '">' + fruits[idx % fruits.length] + '</div>'; }
    groupsHTML += '<div style="display:flex;flex-direction:column;align-items:center;margin:0 8px;"><div class="bracket">⟨</div><div class="contains-row" style="margin:0">' + itemsHTML + '</div><div class="bracket-label">第' + (g+1) + '组</div></div>';
  }
  let remItemsHTML = '';
  for (let d = 0; d < remainder; d++) remItemsHTML += '<div class="item-block" style="background:var(--border-light);opacity:0.6">' + fruits[(quotient*divisor+d) % fruits.length] + '</div>';
  const remHTML = remainder > 0 ? '<div style="text-align:center;margin:8px 0;color:var(--text-muted);font-size:0.85em">还剩 ' + remainder + ' 个，不够再分一组' + remItemsHTML + '</div><span class="remainder-tag">余 ' + remainder + '</span>' : '';
  const result = remainder > 0 ? quotient + ' 余 ' + remainder : '' + quotient;
  vizArea.innerHTML = '<div class="viz-title">🔵 包含除法 — 每组固定数量，求能分几组</div><div class="viz-desc">有 <strong>' + total + '</strong> 个物品，<strong>每组 ' + divisor + ' 个</strong>，能分几组？</div><div style="display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-start;gap:8px;margin:16px 0">' + groupsHTML + '</div>' + (remainder > 0 && remItemsHTML ? '<div style="display:flex;justify-content:center;gap:6px;margin:8px 0;opacity:0.5">' + remItemsHTML + '</div>' : '') + '<div class="equation">' + total + ' ÷ ' + divisor + ' = <span>' + result + '</span>' + (remainder > 0 ? '<span class="remainder-tag">余 ' + remainder + '</span>' : '') + '</div><div class="summary"><strong>含义：</strong>' + total + ' 里面有 <strong>' + quotient + ' 个 ' + divisor + '</strong>' + (remainder > 0 ? '，还多出 ' + remainder + ' 个' : '') + '。<br><strong>关键：</strong>除数 = 每组的数量，商 = 组数。' + (remainder > 0 ? ' 余数 < 除数，说明剩下的不够再分一组。' : '') + '</div>';
}
function renderMeasure(total, divisor) {
  const quotient = Math.floor(total / divisor), remainder = total % divisor, pctFull = (total / 24) * 100, pctPerUnit = (divisor / total) * 100;
  let marksHTML = '';
  for (let i = 1; i <= quotient; i++) marksHTML += '<div class="measure-mark" style="left:' + ((i * divisor / total) * pctFull) + '%;width:' + pctPerUnit + '%">' + (i*divisor) + '</div>';
  const remText = remainder > 0 ? '，多出 ' + remainder + ' 量不完一个完整的 ' + divisor : '';
  vizArea.innerHTML = '<div class="viz-title">🟡 量度除法 — 用除数作为"尺子"去量被除数</div><div class="viz-desc">用长度为 <strong>' + divisor + '</strong> 的"尺子"去量 <strong>' + total + '</strong>，能量几次？</div><div class="measure-bar" style="width:100%"><div class="measure-fill" style="width:' + pctFull + '%">' + total + '</div><div class="measure-marks">' + marksHTML + '</div></div><div style="text-align:center;margin:10px 0;font-size:0.9em;color:var(--text-muted)">' + Array(quotient).fill(0).map((_,i) => '<span style="display:inline-block;background:var(--success);color:#fff;padding:4px 12px;border-radius:16px;margin:4px;font-size:0.85em">第' + (i+1) + '次量：' + divisor + '</span>').join('') + (remainder > 0 ? '<span style="display:inline-block;background:var(--danger);color:#fff;padding:4px 12px;border-radius:16px;margin:4px;font-size:0.85em">剩余：' + remainder + '</span>' : '') + '</div><div class="equation">' + total + ' ÷ ' + divisor + ' = <span>' + (quotient > 0 ? quotient : 0) + '</span>' + (remainder > 0 ? ' 余 <span>' + remainder + '</span>' : '') + '</div><div class="summary"><strong>含义：</strong>用"' + divisor + '"作标准去量"' + total + '"，量了 <strong>' + quotient + ' 次</strong>' + remText + '。<br><strong>关键：</strong>商表示"量了几次"，余数表示"最后量不完的部分"。<br><strong>关系：</strong>' + quotient + ' × ' + divisor + ' + ' + remainder + ' = ' + (quotient * divisor + remainder) + ' = ' + total + ' ✅</div>';
}
document.querySelectorAll('.tab').forEach(tab => { tab.addEventListener('click', () => { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); currentMode = tab.dataset.mode; update(); }); });
document.querySelectorAll('.step-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    var targetId = this.dataset.target, delta = parseInt(this.dataset.delta), inp = document.getElementById(targetId), newVal = parseInt(inp.value) + delta, min = parseInt(inp.min), max = parseInt(inp.max);
    if (newVal < min) newVal = min; if (newVal > max) newVal = max; inp.value = newVal;
    var sliderId = targetId === 'nTotal' ? 'totalSlider' : 'divisorSlider'; document.getElementById(sliderId).value = newVal; update();
  });
});
totalSlider.addEventListener('input', function(){ document.getElementById('nTotal').value=this.value; update(); });
divisorSlider.addEventListener('input', function(){ document.getElementById('nDivisor').value=this.value; update(); });
update();
</script>
</body>
</html>

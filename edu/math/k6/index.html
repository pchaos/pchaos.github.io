<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K6 数学可视化学习</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2.5rem;
      color: #2c3e50;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #7f8c8d;
      margin-bottom: 2.5rem;
      font-size: 1.1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem;
      max-width: 800px;
      width: 100%;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      text-decoration: none;
      color: #2c3e50;
      box-shadow: 0 4px 6px rgba(0,0,0,0.07);
      transition: transform 0.2s, box-shadow 0.2s;
      text-align: center;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }
    .card .icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }
    .card .name {
      font-size: 1.2rem;
      font-weight: 600;
    }
    .card .desc {
      font-size: 0.85rem;
      color: #95a5a6;
      margin-top: 0.3rem;
    }
  </style>
</head>
<body>
  <h1>📐 K6 数学可视化</h1>
  <p class="subtitle">小学数学概念互动学习</p>

  <div class="grid">
    <a class="card" href="multiplication-table.html">
      <div class="icon">✖️</div>
      <div class="name">九九乘法表</div>
      <div class="desc">互动练习</div>
    </a>
    <a class="card" href="multiplication-meaning.html">
      <div class="icon">🍎</div>
      <div class="name">乘法的意义</div>
      <div class="desc">点阵可视化</div>
    </a>
    <a class="card" href="multiplication-vertical.html">
      <div class="icon">🧮</div>
      <div class="name">乘法竖式</div>
      <div class="desc">分步笔算</div>
    </a>
    <a class="card" href="division.html">
      <div class="icon">➗</div>
      <div class="name">除法的意义</div>
      <div class="desc">可视化</div>
    </a>
    <a class="card" href="integer-division.html">
      <div class="icon">🔢</div>
      <div class="name">整数除法</div>
      <div class="desc">可视化</div>
    </a>
    <a class="card" href="fraction.html">
      <div class="icon">🍕</div>
      <div class="name">分数</div>
      <div class="desc">视觉学习</div>
    </a>
    <a class="card" href="triangle-angle-sum.html">
      <div class="icon">📐</div>
      <div class="name">三角形内角和</div>
      <div class="desc">几何互动</div>
    </a>
  </div>
</body>
</html>

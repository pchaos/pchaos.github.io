<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子烟花秀 - CYM</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .text-container {
            position: absolute;
            z-index: 2;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        
        .cyn-text {
            font-size: 120px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                3px 3px 0 #2980b9,
                6px 6px 0 #1c5a7a,
                9px 9px 0 #143a52,
                12px 12px 20px rgba(0,0,0,0.8);
            transform: perspective(500px) rotateX(10deg);
            letter-spacing: 8px;
        }
    </style>
</head>
<body>
    <canvas id="fireworksCanvas"></canvas>
    <div class="text-container" id="textContainer">
        <div class="cyn-text">CYM</div>
    </div>

    <script>
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        const textContainer = document.getElementById('textContainer');
        
        // 设置画布大小
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // 烟花数组
        let fireworks = [];
        let startTime = Date.now();
        let showText = false;
        
        // 深蓝色背景
        const backgroundColor = '#0a192f';
        
        // 粒子类[1,3](@ref)
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = {
                    x: (Math.random() - 0.5) * 8,
                    y: (Math.random() - 0.5) * 8 - 2
                };
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.005;
                this.size = Math.random() * 3 + 1;
            }
            
            update() {
                this.velocity.y += 0.1; // 重力[1](@ref)
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= this.decay;
                this.size *= 0.99;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // 烟花类[1,5](@ref)
        class Firework {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`; // 随机颜色[1](@ref)
                this.particles = [];
                this.createParticles();
            }
            
            createParticles() {
                const particleCount = 150;
                for (let i = 0; i < particleCount; i++) {
                    this.particles.push(new Particle(this.x, this.y, this.color));
                }
            }
            
            update() {
                this.particles.forEach((particle, index) => {
                    particle.update();
                    if (particle.alpha <= 0) {
                        this.particles.splice(index, 1);
                    }
                });
            }
            
            draw() {
                this.particles.forEach(particle => {
                    particle.draw();
                });
            }
        }
        
        // 创建随机烟花[3](@ref)
        function createRandomFirework() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height * 0.6 + canvas.height * 0.2;
            fireworks.push(new Firework(x, y));
        }
        
        // 动画循环[1](@ref)
        function animate() {
            const currentTime = Date.now();
            const elapsedTime = (currentTime - startTime) / 1000;
            
            // 清除画布并绘制深蓝色背景[1](@ref)
            ctx.fillStyle = backgroundColor + '15';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 前10秒显示烟花[5](@ref)
            if (elapsedTime < 10) {
                // 随机生成新烟花
                if (Math.random() < 0.08) {
                    createRandomFirework();
                }
                
                // 更新和绘制所有烟花
                fireworks.forEach((firework, index) => {
                    firework.update();
                    firework.draw();
                    
                    // 移除没有粒子的烟花
                    if (firework.particles.length === 0) {
                        fireworks.splice(index, 1);
                    }
                });
            } else if (!showText) {
                // 10秒后显示文字[9](@ref)
                showText = true;
                textContainer.style.opacity = '1';
                
                // 添加星星背景
                createStars();
            }
            
            // 绘制星星（如果已显示文字）
            if (showText) {
                drawStars();
            }
            
            requestAnimationFrame(animate);
        }
        
        // 星星效果
        let stars = [];
        
        function createStars() {
            stars = [];
            const starCount = 200;
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    brightness: Math.random() * 0.8 + 0.2,
                    twinkleSpeed: Math.random() * 0.05 + 0.02
                });
            }
        }
        
        function drawStars() {
            stars.forEach(star => {
                const brightness = star.brightness + Math.sin(Date.now() * star.twinkleSpeed) * 0.3;
                ctx.save();
                ctx.globalAlpha = Math.max(0, brightness);
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }
        
        // 窗口大小调整
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (showText) {
                createStars();
            }
        });
        
        // 启动动画
        animate();
        
        // 10秒后自动显示文字
        setTimeout(() => {
            showText = true;
            textContainer.style.opacity = '1';
            createStars();
        }, 10000);
    </script>
</body>
</html>
